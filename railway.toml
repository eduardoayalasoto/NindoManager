[build]
builder = "nixpacks"

[deploy]
# Migrate DB, collect static, then start server.
# load_initial_data runs only if branches don't exist yet (idempotent).
startCommand = "sh -c 'set -e; export DJANGO_SETTINGS_MODULE=config.settings.production; echo \"→ Running migrations...\"; python manage.py migrate --noinput; echo \"→ Collecting static files...\"; python manage.py collectstatic --noinput; echo \"→ Loading initial data...\"; python manage.py load_initial_data; echo \"→ Starting server...\"; exec gunicorn config.wsgi:application --bind \"0.0.0.0:${PORT:-8000}\" --workers 2'"


restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.variables]
DJANGO_SETTINGS_MODULE = "config.settings.production"
# DATABASE_URL = "sqlite:////mnt/data/db.sqlite3"  ← set in Railway dashboard
