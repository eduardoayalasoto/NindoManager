{% extends "base.html" %}
{% block title %}Recuperar contraseña - Nindo Manager{% endblock %}

{% block auth_content %}
<div class="min-h-screen bg-white flex items-center justify-center p-8">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="font-black text-4xl tracking-widest uppercase">NINDŌ</h1>
      <div class="h-1 w-10 bg-red-600 mx-auto mt-2"></div>
    </div>
    <h2 class="text-xl font-bold text-black mb-2">Recuperar contraseña</h2>
    <p class="text-gray-500 text-sm mb-6">Ingresa tu email y te enviaremos instrucciones.</p>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-black mb-1">{{ field.label }}</label>
        {{ field }}
      </div>
      {% endfor %}
      <button type="submit" class="w-full py-3 bg-black text-white font-semibold rounded-lg hover:bg-red-600 transition-colors">
        Enviar instrucciones
      </button>
    </form>
    <div class="mt-4 text-center">
      <a href="{% url 'users:login' %}" class="text-sm text-gray-500 hover:text-black">← Volver al login</a>
    </div>
  </div>
</div>
{% endblock %}
