{% extends "base.html" %}
{% block title %}Nueva contraseña - Nindo Manager{% endblock %}
{% block auth_content %}
<div class="min-h-screen bg-white flex items-center justify-center p-8">
  <div class="w-full max-w-md">
    <h1 class="font-black text-4xl tracking-widest uppercase mb-8 text-center">NINDŌ</h1>
    <h2 class="text-xl font-bold text-black mb-6">Establecer nueva contraseña</h2>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-black mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p class="mt-1 text-xs text-red-600">{{ field.errors.0 }}</p>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="w-full py-3 bg-black text-white font-semibold rounded-lg hover:bg-red-600 transition-colors">
        Guardar contraseña
      </button>
    </form>
  </div>
</div>
{% endblock %}
