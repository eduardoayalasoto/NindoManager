{% extends "base.html" %}
{% block title %}Cambiar contraseña - Nindo Manager{% endblock %}
{% block content %}
<div class="max-w-md">
  <h1 class="text-2xl font-bold text-black mb-6">Cambiar contraseña</h1>
  <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-black mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p class="mt-1 text-xs text-red-600">{{ field.errors.0 }}</p>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="w-full py-2.5 bg-black text-white font-medium rounded-lg hover:bg-red-600 transition-colors">
        Cambiar contraseña
      </button>
    </form>
  </div>
</div>
{% endblock %}
