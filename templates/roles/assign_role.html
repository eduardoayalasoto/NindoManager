{% extends "base.html" %}
{% block title %}Asignar rol - Nindo Manager{% endblock %}
{% block content %}
<div class="max-w-md">
  <div class="mb-6">
    <a href="{% url 'users:list' %}" class="text-sm text-gray-500 hover:text-black">← Volver a usuarios</a>
    <h1 class="text-2xl font-bold text-black mt-2">Asignar rol</h1>
  </div>
  <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-black mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p class="mt-1 text-xs text-red-600">{{ field.errors.0 }}</p>{% endif %}
      </div>
      {% endfor %}
      <div class="flex gap-3 pt-2">
        <button type="submit" class="px-6 py-2.5 bg-black text-white font-medium rounded-lg hover:bg-red-600 transition-colors">
          Asignar rol
        </button>
        <a href="{% url 'users:list' %}" class="px-6 py-2.5 border border-gray-200 text-black rounded-lg hover:bg-gray-50">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
