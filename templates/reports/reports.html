{% extends "base.html" %}
{% block title %}Reportes - Nindo Manager{% endblock %}

{% block content %}
<div class="max-w-3xl space-y-6" x-data="reportesApp()">

  <div>
    <h1 class="text-2xl font-bold text-black">Reportes</h1>
    <p class="text-sm text-gray-500 mt-1">Genera resúmenes para compartir por WhatsApp</p>
  </div>

  <!-- Config card -->
  <div class="bg-white border border-gray-200 rounded-xl p-6 space-y-5">

    <!-- Tipo de proceso -->
    <div>
      <label class="block text-sm font-semibold text-black mb-2">Tipo de reporte</label>
      <div class="flex gap-3">
        <label class="flex-1 cursor-pointer">
          <input type="radio" name="report_type" value="day" x-model="type" class="sr-only">
          <div :class="type === 'day'
                ? 'border-violet-500 bg-violet-50 text-violet-700'
                : 'border-gray-200 text-gray-600 hover:border-gray-300'"
               class="border-2 rounded-xl p-4 text-center transition-colors">
            <div class="text-2xl mb-1">📋</div>
            <div class="font-semibold text-sm">Del día</div>
            <div class="text-xs mt-0.5 opacity-70">Selecciona una fecha</div>
          </div>
        </label>
        <label class="flex-1 cursor-pointer">
          <input type="radio" name="report_type" value="week" x-model="type" class="sr-only">
          <div :class="type === 'week'
                ? 'border-violet-500 bg-violet-50 text-violet-700'
                : 'border-gray-200 text-gray-600 hover:border-gray-300'"
               class="border-2 rounded-xl p-4 text-center transition-colors">
            <div class="text-2xl mb-1">📅</div>
            <div class="font-semibold text-sm">Semanal</div>
            <div class="text-xs mt-0.5 opacity-70">Selecciona una semana</div>
          </div>
        </label>
      </div>
    </div>

    <!-- Sucursal -->
    <div>
      <label class="block text-sm font-semibold text-black mb-2">Sucursal</label>
      <select x-model="branch"
              class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-violet-500">
        <option value="">Todas las sucursales</option>
        {% for b in branches %}
        <option value="{{ b.pk }}">{{ b.name }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Date picker: día -->
    <div x-show="type === 'day'" x-cloak>
      <label class="block text-sm font-semibold text-black mb-2">Fecha</label>
      <input type="date" x-model="selectedDate"
             class="px-3.5 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-violet-500">
    </div>

    <!-- Date picker: semana -->
    <div x-show="type === 'week'" x-cloak>
      <label class="block text-sm font-semibold text-black mb-2">Semana</label>
      <input type="week" x-model="selectedWeek"
             class="px-3.5 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-violet-500">
    </div>

    <button @click="generate()"
            :disabled="loading"
            class="w-full py-2.5 rounded-lg text-white font-semibold text-sm transition-opacity hover:opacity-90 disabled:opacity-60"
            style="background: linear-gradient(to right, #7c3aed, #6d28d9);">
      <span x-show="!loading">Generar reporte</span>
      <span x-show="loading" x-cloak>Generando…</span>
    </button>
  </div>

  <!-- Preview -->
  <div x-show="report" x-cloak class="bg-white border border-gray-200 rounded-xl overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <h2 class="font-semibold text-black">Vista previa</h2>
      <div class="flex gap-2">
        <button @click="copyReport()"
                class="flex items-center gap-1.5 px-3 py-1.5 border border-gray-200 text-sm rounded-lg hover:bg-gray-50 transition-colors">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span x-text="copied ? '¡Copiado!' : 'Copiar'"></span>
        </button>
        <a :href="whatsappLink()"
           target="_blank"
           class="flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-lg text-white transition-opacity hover:opacity-90"
           style="background-color: #25D366;">
          <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          WhatsApp
        </a>
      </div>
    </div>
    <pre class="p-5 text-sm text-gray-800 whitespace-pre-wrap font-mono leading-relaxed bg-gray-50"
         x-text="report"></pre>
  </div>

</div>

<script>
function reportesApp() {
  const today = new Date().toISOString().split('T')[0];
  const todayDate = new Date();
  const year = todayDate.getFullYear();
  const week = getISOWeek(todayDate);
  const weekStr = `${year}-W${String(week).padStart(2, '0')}`;

  return {
    type: 'day',
    branch: '',
    selectedDate: today,
    selectedWeek: weekStr,
    report: '',
    loading: false,
    copied: false,

    generate() {
      this.loading = true;
      this.report = '';
      const params = new URLSearchParams({ type: this.type, branch: this.branch });
      if (this.type === 'day') params.set('date', this.selectedDate);
      else params.set('week', this.selectedWeek);

      fetch(`/reportes/generar/?${params}`, {
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
      })
      .then(r => r.json())
      .then(data => { this.report = data.report; })
      .finally(() => { this.loading = false; });
    },

    copyReport() {
      navigator.clipboard.writeText(this.report).then(() => {
        this.copied = true;
        setTimeout(() => { this.copied = false; }, 2000);
      });
    },

    whatsappLink() {
      return `https://api.whatsapp.com/send?text=${encodeURIComponent(this.report)}`;
    },
  };
}

function getISOWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}
</script>
{% endblock %}
