<div class="ui-shell {{ class_name|default:'' }}">
  {% if title or subtitle or header_action %}
  <div class="border-b border-gray-100 px-5 py-4">
    <div class="flex items-start justify-between gap-4">
      <div>
        {% if title %}<h3 class="text-sm font-semibold text-gray-900">{{ title }}</h3>{% endif %}
        {% if subtitle %}<p class="mt-1 text-xs text-gray-500">{{ subtitle }}</p>{% endif %}
      </div>
      {% if header_action %}<div>{{ header_action|safe }}</div>{% endif %}
    </div>
  </div>
  {% endif %}
  <div class="p-5 {{ body_class|default:'' }}">
    {{ content|safe }}
  </div>
</div>
