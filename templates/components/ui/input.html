{% with base='w-full rounded-lg border border-gray-300 bg-white px-3.5 py-2.5 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 ui-focus disabled:bg-gray-100 disabled:text-gray-500' %}
<input
  type="{{ type|default:'text' }}"
  name="{{ name|default:'' }}"
  id="{{ id|default:name|default:'' }}"
  value="{{ value|default:'' }}"
  placeholder="{{ placeholder|default:'' }}"
  {% if required %}required{% endif %}
  {% if disabled %}disabled{% endif %}
  class="{{ base }} {{ class_name|default:'' }}"
  {% if attrs %}{{ attrs|safe }}{% endif %}
/>
{% endwith %}
