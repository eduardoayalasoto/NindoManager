<div x-cloak x-show="{{ open_var|default:'openModal' }}" class="fixed inset-0 z-50 overflow-y-auto" aria-modal="true" role="dialog">
  <div class="flex min-h-screen items-end justify-center px-4 pb-12 pt-6 text-center sm:items-center sm:p-0">
    <div class="fixed inset-0 bg-black/50 transition-opacity" @click="{{ open_var|default:'openModal' }} = false"></div>
    <div class="relative w-full max-w-lg transform overflow-hidden rounded-xl bg-white text-left shadow-md transition-all">
      <div class="border-b border-gray-100 px-5 py-4">
        <h3 class="text-base font-semibold text-gray-900">{{ title|default:'Modal' }}</h3>
      </div>
      <div class="px-5 py-4 text-sm text-gray-600">
        {{ content|safe }}
      </div>
      <div class="flex justify-end gap-3 border-t border-gray-100 px-5 py-4">
        <button type="button" @click="{{ open_var|default:'openModal' }} = false"
          class="inline-flex items-center justify-center rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-50 ui-focus">
          {{ cancel_label|default:'Cancelar' }}
        </button>
        {% if confirm_label %}
          {% include "components/ui/button.html" with label=confirm_label variant=confirm_variant|default:'primary' attrs=confirm_attrs %}
        {% endif %}
      </div>
    </div>
  </div>
</div>
