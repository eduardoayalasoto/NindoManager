{% if messages %}
<div class="mb-4 space-y-2">
  {% for message in messages %}
  <div class="px-4 py-3 rounded-lg border flex items-center justify-between
    {% if message.tags == 'error' %}bg-red-50 border-red-200 text-red-800
    {% elif message.tags == 'success' %}bg-green-50 border-green-200 text-green-800
    {% elif message.tags == 'warning' %}bg-yellow-50 border-yellow-200 text-yellow-800
    {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}"
    x-data="{ show: true }" x-show="show">
    <span class="text-sm">{{ message }}</span>
    <button @click="show = false" class="ml-4 text-current opacity-60 hover:opacity-100">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  {% endfor %}
</div>
{% endif %}
