<nav class="fixed top-0 left-0 right-0 z-50 bg-black text-white h-14 flex items-center px-4 justify-between">
  <div class="flex items-center gap-4">
    <div class="flex items-center gap-2">
      <span class="font-bold text-lg tracking-widest uppercase">NINDŌ</span>
      <span class="text-xs text-gray-400 tracking-widest uppercase">MANAGER</span>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <!-- Notificaciones -->
    <a href="{% url 'notifications:list' %}" class="relative text-white hover:text-red-500 transition-colors" id="notif-bell">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
      <span id="notif-count" class="absolute -top-1 -right-1 bg-red-600 text-white text-xs rounded-full h-4 w-4 flex items-center justify-center hidden">0</span>
    </a>

    <!-- Usuario -->
    <div class="relative" x-data="{ open: false }">
      <button @click="open = !open" class="flex items-center gap-2 text-sm hover:text-gray-300 transition-colors">
        <div class="h-7 w-7 rounded-full bg-red-600 flex items-center justify-center text-xs font-bold">
          {{ user.first_name|first|upper }}{{ user.last_name|first|upper }}
        </div>
        <span class="hidden md:block">{{ user.get_full_name|default:user.username }}</span>
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div x-show="open" @click.away="open = false" x-cloak
           class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-lg py-1 text-black">
        <a href="{% url 'users:profile' %}" class="block px-4 py-2 text-sm hover:bg-gray-100">Mi perfil</a>
        <a href="{% url 'users:password_change' %}" class="block px-4 py-2 text-sm hover:bg-gray-100">Cambiar contraseña</a>
        <hr class="my-1">
        <form method="post" action="{% url 'users:logout' %}">
          {% csrf_token %}
          <button type="submit" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-100 text-red-600">Cerrar sesión</button>
        </form>
      </div>
    </div>
  </div>
</nav>

<div class="h-14"></div>

<script>
  fetch('/notificaciones/contador/')
    .then(r => r.json())
    .then(data => {
      if (data.count > 0) {
        const el = document.getElementById('notif-count');
        el.textContent = data.count;
        el.classList.remove('hidden');
      }
    }).catch(() => {});
</script>
