<aside class="fixed left-0 top-14 bottom-0 w-64 bg-black text-white overflow-y-auto z-40">
  <nav class="p-4 space-y-1">

    <a href="{% url 'dashboard:index' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors {% if request.resolver_match.namespace == 'dashboard' %}bg-red-600 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %}">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      Dashboard
    </a>

    <a href="{% url 'tasks:daily' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors {% if request.resolver_match.namespace == 'tasks' and request.resolver_match.url_name in 'daily,instance_detail,instance_start,instance_complete,checklist_toggle' %}bg-red-600 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %}">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
      </svg>
      Tareas del día
    </a>

    <a href="{% url 'tasks:list' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors {% if request.resolver_match.namespace == 'tasks' and request.resolver_match.url_name in 'list,create,detail,update,delete' %}bg-red-600 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %}">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
      </svg>
      Todas las tareas
    </a>

    <a href="{% url 'branches:list' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors {% if request.resolver_match.namespace == 'branches' %}bg-red-600 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %}">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
      </svg>
      Sucursales
    </a>

    <a href="{% url 'reports:index' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors {% if request.resolver_match.namespace == 'reports' %}bg-red-600 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %}">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      Reportes
    </a>

    <a href="{% url 'activities:list' %}"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors {% if request.resolver_match.namespace == 'activities' %}bg-red-600 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %}">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
      </svg>
      Actividades
    </a>

    {% if user.is_staff or user.is_superuser %}
    <div class="pt-4">
      <p class="text-xs text-gray-500 uppercase tracking-wider px-3 mb-2">Administración</p>

      <a href="{% url 'users:list' %}"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors {% if request.resolver_match.namespace == 'users' and 'perfil' not in request.path %}bg-red-600 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %}">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        Usuarios
      </a>

      <a href="{% url 'roles:list' %}"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors {% if request.resolver_match.namespace == 'roles' %}bg-red-600 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %}">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
        Roles
      </a>
    </div>
    {% endif %}
  </nav>
</aside>
